name: Build

# Builds the Linux AppImage and Windows installer on their native runners
# (the native/audio-engine Rust addon links against a platform audio API —
# ALSA/PipeWire on Linux, WASAPI on Windows — so each is built on a real
# host of that OS rather than cross-compiled). Push a `v*` tag to also
# publish a GitHub Release with both artifacts attached.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-glob: dist/*.AppImage
          - os: windows-latest
            artifact-glob: dist/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      # cpal (rodio's output backend) links against ALSA on Linux via
      # alsa-sys, whose build script needs the dev headers — not present on
      # the runner by default.
      - name: Install ALSA dev headers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      # `npm install`, not `ci` — the file: dependency on native/audio-engine
      # is rebuilt per-platform by postinstall anyway, so lockfile-exact
      # reproducibility doesn't apply here, and npm ci's stricter file:
      # resolution check has proven version-sensitive across npm releases.
      - name: Install dependencies
        run: npm install

      - name: Build distributable
        run: npm run dist

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: icosahedron-${{ matrix.os }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
